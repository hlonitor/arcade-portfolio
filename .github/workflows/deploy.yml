name: Deploy to GitHub Pages

# Build the Vite site and publish it to GitHub Pages on every push to main.
# Also runnable on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required by the official Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run so a
# live deploy always finishes cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # VITE_BASE scopes asset URLs to the repo subpath for project Pages
        # (https://<user>.github.io/<repo>/). EmailJS values are PUBLIC
        # client-side identifiers pulled from repo Variables (or Secrets) —
        # never hardcoded in source.
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_EMAILJS_SERVICE_ID: ${{ vars.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ vars.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ vars.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_LINKEDIN_URL: ${{ vars.VITE_LINKEDIN_URL }}
        run: npm run build

      - name: Add SPA + Jekyll bypass files
        # .nojekyll stops GitHub from ignoring Vite's _-prefixed asset paths.
        # 404.html mirrors index.html so client-side deep links still resolve.
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
